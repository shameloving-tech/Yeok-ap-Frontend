name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Android APK (Gradle Release)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Java 17
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      # Gradle + NDK 빌드 캐시 — package-lock 변경 시에만 무효화
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # react-native-reanimated C++ / NDK 빌드 결과물 캐시
      - name: Cache NDK build outputs
        uses: actions/cache@v4
        with:
          path: |
            node_modules/react-native-reanimated/android/build
            node_modules/react-native-worklets/android/build
          key: ndk-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ndk-${{ runner.os }}-

      # repo.maven.apache.org가 403 반환할 경우 repo1.maven.org로 폴백
      - name: Configure Gradle Maven fallback
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/maven-fallback.gradle << 'EOF'
          allprojects {
            buildscript {
              repositories {
                maven { url 'https://repo1.maven.org/maven2/' }
                google()
                mavenCentral()
              }
            }
            repositories {
              maven { url 'https://repo1.maven.org/maven2/' }
              google()
              mavenCentral()
            }
          }
          EOF

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Patch release signing to use debug keystore
        run: |
          node -e "
            const fs = require('fs');
            const file = 'android/app/build.gradle';
            let g = fs.readFileSync(file, 'utf8');
            g = g.replace(/signingConfig signingConfigs\.release/g, 'signingConfig signingConfigs.debug');
            fs.writeFileSync(file, g);
            console.log('Patched signingConfig for release build');
          "

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --build-cache
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4

      - name: Get version
        id: ver
        run: echo "v=$(jq -r '.expo.version' app.json)" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: Yeok-Ap_${{ steps.ver.outputs.v }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
