name: Build Android APK (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: EAS Android APK Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Get app version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./app.json').expo.version)")
          echo "v=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Android APK via EAS Cloud
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            > /tmp/eas_output.json
        env:
          EXPO_TOKEN: dF8vXz4_slj0nrACcsPP16uQU4bUF4j-RMZg7vXm

      - name: Extract APK download URL
        id: build_url
        run: |
          URL=$(node -e "
            const raw = require('fs').readFileSync('/tmp/eas_output.json', 'utf8');
            const start = raw.indexOf('[') !== -1 ? raw.indexOf('[') : raw.indexOf('{');
            const builds = JSON.parse(raw.substring(start));
            const b = Array.isArray(builds) ? builds[0] : builds;
            console.log(b && b.artifacts && (b.artifacts.buildUrl || b.artifacts.applicationArchiveUrl) || '');
          ")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Download versioned APK
        run: |
          APK_NAME="Yeok-Ap_${{ steps.version.outputs.v }}.apk"
          curl -L "${{ steps.build_url.outputs.url }}" -o "$APK_NAME"
          echo "Downloaded: $APK_NAME"

      - name: Upload APK as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yeok-Ap_${{ steps.version.outputs.v }}
          path: Yeok-Ap_${{ steps.version.outputs.v }}.apk
          retention-days: 90
