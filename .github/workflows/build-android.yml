name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    name: Android APK (Gradle Release)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache NDK build outputs
        uses: actions/cache@v4
        with:
          path: |
            node_modules/react-native-reanimated/android/build
            node_modules/react-native-worklets/android/build
          key: ndk-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: ndk-${{ runner.os }}-

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Patch release signing to use debug keystore
        run: |
          node -e "
            const fs = require('fs');
            const file = 'android/app/build.gradle';
            let g = fs.readFileSync(file, 'utf8');
            g = g.replace(/signingConfig signingConfigs\.release/g, 'signingConfig signingConfigs.debug');
            fs.writeFileSync(file, g);
          "

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --build-cache
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.parallel=true"

      - name: Get version
        id: ver
        run: echo "v=$(jq -r '.expo.version' app.json)" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: "Yeok-Ap_${{ steps.ver.outputs.v }}"
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
