name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    name: Android APK (Gradle Release)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Patch release signing to use debug keystore
        run: |
          node -e "
            const fs = require('fs');
            const file = 'android/app/build.gradle';
            let g = fs.readFileSync(file, 'utf8');
            g = g.replace(/signingConfig signingConfigs\.release/g, 'signingConfig signingConfigs.debug');
            fs.writeFileSync(file, g);
            console.log('Patched signingConfig for release build');
          "

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Xmx4g

      - name: Get version
        id: ver
        run: |
          echo "v=$(jq -r '.expo.version' app.json)" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: Yeok-Ap_${{ steps.ver.outputs.v }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
