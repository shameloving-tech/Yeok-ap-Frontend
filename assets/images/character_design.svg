<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(212, 162) scale(3.8)">
    <!-- Body Outline -->
    <rect x="20" y="40" width="120" height="120" rx="30" fill="white" stroke="#1E3A5F" stroke-width="4"/>
    
    <!-- Face Display Area -->
    <rect x="35" y="75" width="90" height="50" rx="15" fill="#F5F8FA" stroke="#E1E8ED" stroke-width="1"/>
    
    <!-- Eyes -->
    <circle cx="60" cy="100" r="3" fill="#1E3A5F"/>
    <circle cx="100" cy="100" r="3" fill="#1E3A5F"/>
    
    <!-- Mouth -->
    <path d="M75 110 H85" stroke="#1E3A5F" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Top Badge (역앞) -->
    <rect x="45" y="25" width="70" height="30" rx="15" fill="#2D6A4F"/>
    <text x="80" y="45" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">역앞</text>

    <!-- Small Yellow Dot -->
    <circle cx="140" cy="80" r="5" fill="#FFD700"/>

    <!-- Wheels (Static) -->
    <circle cx="45" cy="160" r="13" fill="#1E3A5F"/>
    <circle cx="115" cy="160" r="13" fill="#1E3A5F"/>
  </g>
</svg>
